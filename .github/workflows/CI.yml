name: CI

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  style:
    name: Kotlin style check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run ktlint check
        run: ./gradlew ktlintCheck --stacktrace

      - name: Upload ktlint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-reports
          path: |
            **/build/reports/ktlint/**
          if-no-files-found: ignore

  shared:
    name: Shared - build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and test shared
        run: ./gradlew :shared:build :shared:test --stacktrace

      - name: Upload shared test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-reports
          path: |
            shared/build/reports/tests/**
            shared/build/test-results/**
          if-no-files-found: ignore

  server:
    name: Server - build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and test server
        run: ./gradlew :server:build :server:test --stacktrace

      - name: Upload server test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: |
            server/build/reports/tests/**
            server/build/test-results/**
          if-no-files-found: ignore

  android:
    name: Android - build and unit test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Android debug APK
        run: ./gradlew :android-app:app:assembleDebug --stacktrace

      - name: Run Android unit tests
        run: ./gradlew :android-app:app:testDebugUnitTest --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            android-app/build/reports/tests/**
            android-app/build/test-results/**
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs:
      - style
      - shared
      - server
      - android
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}