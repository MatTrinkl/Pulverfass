name: CI

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  style:
    name: Kotlin style check
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run ktlint check
        run: ./gradlew ktlintCheck --stacktrace

      - name: Upload ktlint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-reports
          path: |
            **/build/reports/ktlint/**
          if-no-files-found: ignore

  build-shared:
    name: Shared - build
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build shared
        run: ./gradlew :shared:build --stacktrace

  build-server:
    name: Server - build
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build server
        run: ./gradlew :server:build --stacktrace

  build-android:
    name: Android - build
    runs-on: self-hosted
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-sdk
          key: ${{ runner.os }}-android-sdk-35
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Android debug APK
        run: ./gradlew :android-app:app:assembleDebug --stacktrace

  test-shared:
    name: Shared - test
    runs-on: self-hosted
    needs: build-shared

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test shared
        run: ./gradlew :shared:test --stacktrace

      - name: Upload shared test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-reports
          path: |
            shared/build/reports/tests/**
            shared/build/test-results/**
          if-no-files-found: ignore

  test-server:
    name: Server - test
    runs-on: self-hosted
    needs: build-server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test server
        run: ./gradlew :server:test --stacktrace

      - name: Upload server test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: |
            server/build/reports/tests/**
            server/build/test-results/**
          if-no-files-found: ignore

  test-android:
    name: Android - unit test
    runs-on: self-hosted
    needs: build-android
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-sdk
          key: ${{ runner.os }}-android-sdk-35
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew :android-app:app:testDebugUnitTest --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            android-app/build/reports/tests/**
            android-app/build/test-results/**
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud analysis
    runs-on: self-hosted
    needs:
      - style
      - test-shared
      - test-server
      - test-android
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
